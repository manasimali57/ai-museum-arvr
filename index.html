<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Musée de l'Intelligence — Paris</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <link rel="stylesheet" href="style.css">
  <script>
    AFRAME.registerComponent('ar-passthrough', {
      init() {
        this.isAR = false;
        this.placed = false;
        this.hitTestSource = null;
        const scene = this.el;

        scene.addEventListener('enter-vr', async () => {
          if (!scene.is('ar-mode')) return;
          this.isAR = true;
          this.placed = false;

          // Remove background so our tick() controls clear color
          scene.removeAttribute('background');

          document.getElementById('tap-msg').style.display = 'block';
          document.getElementById('reticle').setAttribute('visible', true);
          document.getElementById('museum-root').setAttribute('visible', false);

          // Hit-test: detect real floor surface
          try {
            const xrSession = scene.renderer.xr.getSession();
            const viewerSpace = await xrSession.requestReferenceSpace('viewer');
            this.hitTestSource = await xrSession.requestHitTestSource({ space: viewerSpace });
          } catch(e) {
            // hit-test not available — place directly in front
            this.placeMuseum(new THREE.Vector3(0, 0, -1));
          }
        });

        scene.addEventListener('exit-vr', () => {
          this.isAR = false;
          this.placed = false;
          this.hitTestSource = null;
          scene.setAttribute('background', 'color: #08060f');
          document.getElementById('museum-root').removeAttribute('scale');
          document.getElementById('museum-root').setAttribute('position', '0 0 0');
          document.getElementById('museum-root').setAttribute('visible', true);
          document.getElementById('shadow-plane').setAttribute('visible', false);
          document.getElementById('reticle').setAttribute('visible', false);
          document.getElementById('tap-msg').style.display = 'none';
          // Restore hidden elements
          ['ar-hide-floor','ar-hide-ceiling','ar-hide-frontwall'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.setAttribute('visible', true);
          });
        });

        // Tap to place museum on detected floor
        document.addEventListener('touchend', (e) => {
          if (!this.isAR || this.placed) return;
          const ret = document.getElementById('reticle');
          if (!ret.object3D.visible) return;
          this.placeMuseum(ret.object3D.position);
        });
      },

      placeMuseum(pos) {
        this.placed = true;
        const museum = document.getElementById('museum-root');
        museum.setAttribute('scale', '0.15 0.15 0.15');
        museum.setAttribute('position', { x: pos.x, y: pos.y, z: pos.z });
        museum.setAttribute('visible', true);
        // Hide floor, ceiling, front wall so real room is visible around the museum
        ['ar-hide-floor','ar-hide-ceiling','ar-hide-frontwall'].forEach(id => {
          const el = document.getElementById(id);
          if (el) el.setAttribute('visible', false);
        });
        document.getElementById('shadow-plane').setAttribute('position', { x: pos.x, y: pos.y + 0.001, z: pos.z });
        document.getElementById('shadow-plane').setAttribute('visible', true);
        document.getElementById('reticle').setAttribute('visible', false);
        document.getElementById('tap-msg').style.display = 'none';
      },

      tick() {
        if (!this.isAR) return;

        // Force transparent every frame
        // THREE.js scene.background MUST be null — otherwise it paints over the camera feed
        this.el.object3D.background = null;
        this.el.renderer.setClearColor(0x000000, 0);
        this.el.renderer.setClearAlpha(0);

        // Update reticle from hit-test
        if (this.placed || !this.hitTestSource) return;
        const frame = this.el.renderer.xr.getFrame();
        if (!frame) return;
        const refSpace = this.el.renderer.xr.getReferenceSpace();
        const hits = frame.getHitTestResults(this.hitTestSource);
        if (hits.length > 0) {
          const pose = hits[0].getPose(refSpace);
          const m = pose.transform.matrix;
          const reticle = document.getElementById('reticle');
          reticle.object3D.position.set(m[12], m[13], m[14]);
          reticle.object3D.visible = true;
        }
      }
    });
  </script>

<div id="ar-overlay">

<div id="chat-panel">
  <div id="chat-title">🏛️ Musée Guide <span id="chat-close">✕</span></div>
  <div id="chat-response">
    <p>Bienvenue! Five galleries await you.<br><br>
    <strong>Grand Hall</strong> → <strong>Galerie II</strong> → <strong>Galerie Profonde</strong><br>
    <strong>Origines</strong> (left) · <strong>Avenir</strong> (right)<br><br>
    <em>Tilt phone to look · Use arrows to walk · Tap a painting</em></p>
  </div>
  <div id="loading" style="display:none">Thinking…</div>
</div>

<button id="ar-btn">Enter AR</button>
<div id="tap-msg">Point at your floor, then tap to place the museum</div>

<script>
  document.getElementById('chat-close').addEventListener('click', () => {
    document.getElementById('chat-panel').style.display = 'none';
  });

  const scene = document.querySelector('a-scene');
  const arBtn = document.getElementById('ar-btn');

  // Show button only if AR is supported
  if (navigator.xr) {
    navigator.xr.isSessionSupported('immersive-ar').then(supported => {
      arBtn.style.display = supported ? 'block' : 'none';
    });
  } else {
    arBtn.style.display = 'none';
  }

  arBtn.addEventListener('click', () => {
    if (scene.is('ar-mode')) {
      scene.exitVR();
    } else {
      scene.enterAR();
    }
  });

  scene.addEventListener('enter-vr', () => {
    if (scene.is('ar-mode')) {
      arBtn.textContent = 'Exit AR';
    }
  });

  scene.addEventListener('exit-vr', () => {
    arBtn.textContent = 'Enter AR';
    window._arCurrentScale = 0.15;
  });
</script>

</div> <!-- end ar-overlay -->

<div id="move-btns">
  <button id="btn-fwd">▲</button>
  <div>
    <button id="btn-left">◀</button>
    <button id="btn-back">▼</button>
    <button id="btn-right">▶</button>
  </div>
</div>

<div id="zoom-btns">
  <button id="btn-zoom-in">＋</button>
  <button id="btn-zoom-out">－</button>
</div>

<script>
  window._arCurrentScale = 0.15;

  const keys = {};
  const speed = 0.05;    // 3D walk speed
  const arSpeed = 0.015; // AR walk speed (museum scale 0.15)

  function move() {
    const camEl = document.querySelector('[camera]');
    const museumRoot = document.getElementById('museum-root');
    const isAR = scene.is('ar-mode');

    if (Object.values(keys).some(Boolean)) {
      // In AR: get yaw from real-world camera orientation via object3D
      // In 3D: get yaw from rotation attribute
      let yaw;
      if (isAR) {
        const euler = new THREE.Euler().setFromQuaternion(camEl.object3D.quaternion, 'YXZ');
        yaw = euler.y;
      } else {
        yaw = THREE.MathUtils.degToRad(camEl.getAttribute('rotation').y);
      }

      const dir = new THREE.Vector3();
      if (keys.fwd)   { dir.z -= Math.cos(yaw); dir.x -= Math.sin(yaw); }
      if (keys.back)  { dir.z += Math.cos(yaw); dir.x += Math.sin(yaw); }
      if (keys.left)  { dir.z += Math.sin(yaw); dir.x -= Math.cos(yaw); }
      if (keys.right) { dir.z -= Math.sin(yaw); dir.x += Math.cos(yaw); }
      dir.normalize().multiplyScalar(isAR ? arSpeed : speed);

      if (isAR) {
        // Move museum in opposite direction — feels like walking through it
        const pos = museumRoot.getAttribute('position');
        museumRoot.setAttribute('position', { x: pos.x - dir.x, y: pos.y, z: pos.z - dir.z });
      } else {
        const pos = camEl.getAttribute('position');
        camEl.setAttribute('position', { x: pos.x + dir.x, y: pos.y, z: pos.z + dir.z });
      }
    }
    requestAnimationFrame(move);
  }
  move();

  const opts = { passive: false };
  const press = (k, v) => e => { e.preventDefault(); e.stopPropagation(); keys[k] = v; };

  [['btn-fwd','fwd'],['btn-back','back'],['btn-left','left'],['btn-right','right']].forEach(([id, k]) => {
    const el = document.getElementById(id);
    el.addEventListener('touchstart',  press(k, true),  opts);
    el.addEventListener('touchend',    press(k, false), opts);
    el.addEventListener('touchcancel', press(k, false), opts);
    el.addEventListener('mousedown',   press(k, true));
    el.addEventListener('mouseup',     press(k, false));
  });

  // Zoom: scale museum up/down in AR
  const SCALE_MIN = 0.03;
  const SCALE_MAX = 0.6;
  const SCALE_STEP = 0.015;

  function zoom(dir) {
    const museum = document.getElementById('museum-root');
    window._arCurrentScale = Math.min(SCALE_MAX, Math.max(SCALE_MIN, window._arCurrentScale + dir * SCALE_STEP));
    const s = window._arCurrentScale;
    museum.object3D.scale.set(s, s, s);
  }

  const zoomIn  = document.getElementById('btn-zoom-in');
  const zoomOut = document.getElementById('btn-zoom-out');
  let zoomInterval = null;

  function startZoom(dir) { zoom(dir); zoomInterval = setInterval(() => zoom(dir), 80); }
  function stopZoom()     { clearInterval(zoomInterval); zoomInterval = null; }

  const zopts = { passive: false };
  zoomIn .addEventListener('touchstart',  e => { e.preventDefault(); startZoom(1);  }, zopts);
  zoomIn .addEventListener('touchend',    e => { e.preventDefault(); stopZoom();    }, zopts);
  zoomIn .addEventListener('touchcancel', e => { e.preventDefault(); stopZoom();    }, zopts);
  zoomIn .addEventListener('mousedown',   () => startZoom(1));
  zoomIn .addEventListener('mouseup',     () => stopZoom());
  zoomOut.addEventListener('touchstart',  e => { e.preventDefault(); startZoom(-1); }, zopts);
  zoomOut.addEventListener('touchend',    e => { e.preventDefault(); stopZoom();    }, zopts);
  zoomOut.addEventListener('touchcancel', e => { e.preventDefault(); stopZoom();    }, zopts);
  zoomOut.addEventListener('mousedown',   () => startZoom(-1));
  zoomOut.addEventListener('mouseup',     () => stopZoom());
</script>

<script src="app.js"></script>
</body>
